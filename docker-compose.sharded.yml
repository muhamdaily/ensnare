services:
   discord-ws:
     image: ghcr.io/muhamdaily/ensnare-ws:latest
     build: 
       context: .
       dockerfile: Dockerfile.ws
     restart: unless-stopped
     init: true
     depends_on:
       - discord-events # seems backwards, but we need to configure our "events we want to receive"
       - redis
     environment:
       DISCORD_TOKEN: ${DISCORD_TOKEN:?REQUIRED}
       REDIS_URL: redis+unix:///redis/redis.sock
       REPLICA_ID: '{{.Task.Slot}}' 
       REPLICA_COUNT: 1 # ${WS_REPLICAS:-1}
       NODE_ENV: production
       FORCE_COLOR: 1
     volumes:
        - redis:/redis
     stop_grace_period: 40s
     deploy:
      # todo: make this possible, but rn it just makes double events 
      #  replicas: ${WS_REPLICAS:-1}
       resources:
         limits:
           memory: 256M
         reservations:
           memory: 25M
       update_config:
         order: stop-first
         parallelism: 0
         failure_action: rollback
         max_failure_ratio: 0
         monitor: 5s
       restart_policy:
         condition: any

   discord-events:
     image: ghcr.io/muhamdaily/ensnare-events:latest
     build: 
       context: .
       dockerfile: Dockerfile.events
     restart: unless-stopped
     init: true
     depends_on:
       - redis
     environment:
       DATABASE_URL: ${DATABASE_URL:-sqlite:///data/ensnare.sqlite}
       DISCORD_TOKEN: ${DISCORD_TOKEN:?REQUIRED}
       HAS_MESSAGE_INTENT: ${HAS_MESSAGE_INTENT:-false} # optional
       NODE_ENV: production
       FORCE_COLOR: 1
       REDIS_URL: redis+unix:///redis/redis.sock
       REPLICA_ID: '{{.Task.Slot}}'
       REPLICA_COUNT: ${EVENTS_REPLICAS:-1}
     volumes:
        - data:/data
        - redis:/redis
     stop_grace_period: 15m
     deploy:
       replicas: ${EVENTS_REPLICAS:-1}
       resources:
         limits:
           memory: 256M
         reservations:
           memory: 25M
       update_config:
         order: start-first
         failure_action: rollback
         max_failure_ratio: 0
         monitor: 5s
       restart_policy:
         condition: any

   stats-api:
     image: ghcr.io/muhamdaily/ensnare-stats:latest
     build: 
       context: .
       dockerfile: Dockerfile.stats
     restart: unless-stopped
     init: true
     depends_on:
       - redis
     environment:
       DATABASE_URL: ${DATABASE_URL:-sqlite:///data/ensnare.sqlite}
       DATABASE_READONLY: 1
       NODE_ENV: production
       FORCE_COLOR: 1
       REDIS_URL: redis+unix:///redis/redis.sock
       REPLICA_ID: '{{.Task.Slot}}'
       REPLICA_COUNT: ${STATS_REPLICAS:-1}
       PORT: 3000
     ports:
        - "${STATS_PORT:-3000}:3000"
     volumes:
        - data:/data
        - redis:/redis
     healthcheck:
       test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/live"]
       interval: 15s
       timeout: 5s
       retries: 3
     deploy:
       replicas: ${STATS_REPLICAS:-1}
       resources:
         limits:
           memory: 64M
           cpus: "0.5"
         reservations:
           memory: 10M
           cpus: "0.1"
       update_config:
         order: start-first
         failure_action: rollback
         max_failure_ratio: 0
         monitor: 5s
       restart_policy:
         condition: any

   redis:
    image: redis:8.6.2-alpine3.23
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --port 0 --unixsocket /redis/redis.sock --unixsocketperm 777 --maxmemory 64mb --maxmemory-policy allkeys-lru --activedefrag yes"]
    volumes:
      - redis-data:/data
      - redis:/redis
    healthcheck:
      test: ["CMD", "redis-cli", "-s", "/redis/redis.sock", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    stop_grace_period: 2s
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 8M
      update_config:
        order: stop-first
        failure_action: rollback
        max_failure_ratio: 0
        monitor: 1s
      restart_policy:
        condition: none


volumes:
  data:
  redis:
    driver: local
  redis-data:
    driver: local

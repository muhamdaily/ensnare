services:
   ensnare:
     image: ghcr.io/muhamdaily/ensnare:latest
     build: .
     restart: unless-stopped
     init: true
     extra_hosts:
       - "host.docker.internal:host-gateway"
     environment:
       DATABASE_URL: ${DATABASE_URL:-sqlite:///data/ensnare.sqlite}
       DISCORD_TOKEN: ${DISCORD_TOKEN:?REQUIRED}
       REDIS_URL: ${REDIS_URL} # optional
       HAS_MESSAGE_INTENT: ${HAS_MESSAGE_INTENT} # optional
       NODE_ENV: production
       FORCE_COLOR: 1
     volumes:
        - data:/data
     deploy:
       resources:
         limits:
           memory: 256M
         reservations:
           memory: 32M

volumes:
  data:
